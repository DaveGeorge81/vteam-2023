version: '3'
services:
    phone:
        image: "davegeorge81/phone:1.0.2"
        environment:
            - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
            - REACT_NATIVE_PACKAGER_HOSTNAME=${IP}
        volumes:
            - ./phone-app/:/phone-app/
        ports:
            - '8081:8081'
            - '8082:8082'
            - '8083:8083'
        tty: true
        stdin_open: true
        command: npx expo start --clear
    server:
        build:
            dockerfile: ./backend/Dockerfile
        volumes:
            - ./backend/db:/server/db
        ports:
            - "1337:1337"
    scooter:
        image: "glopal78/scooter-simulation:latest"
        environment:
                - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
                - REACT_NATIVE_PACKAGER_HOSTNAME=${IP}
        volumes:
            - ./scooter-simulation/:/scooter-simulation/
        ports:
            - "1337:1337"
